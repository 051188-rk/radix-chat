<section class="auth-shell">
  <article class="auth-card" appMotionEnter>
    <header>
      <img src="assets/radix_logo.png" alt="Radix Logo" class="logo">
      <p>Secure access to your multi-model workspace.</p>
    </header>

    <nav class="auth-tabs">
      <button type="button" [class.active]="authMode() === 'login'" (click)="setMode('login')">Login</button>
      <button type="button" [class.active]="authMode() === 'signup'" (click)="setMode('signup')">Signup</button>
    </nav>

    <form (ngSubmit)="submit()">
      @if (authMode() === "signup") {
        <label>
          <span>Username</span>
          <input
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            name="username"
            required
            minlength="3"
          />
        </label>
      }
      <label>
        <span>Email</span>
        <input [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" type="email" required />
      </label>
      <label>
        <span>Password</span>
        <input
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          type="password"
          required
          minlength="8"
        />
      </label>

      <button class="submit" type="submit" [disabled]="loading()">
        {{ loading() ? "Please wait..." : authMode() === "login" ? "Enter workspace" : "Create account" }}
      </button>
    </form>
  </article>
</section>
